<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Exam Simulator - Módulo 2 Lección 6 Parte 1</title>
    <style>
        :root {
            --aws-navy: #232f3e;
            --aws-orange: #ff9900;
            --aws-white: #ffffff;
            --aws-gray: #f2f3f3;
            --success: #e7f4e4;
            --error: #fdf0f0;
            --explanation: #fff9c4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--aws-gray);
            margin: 0;
            padding: 0;
            color: var(--aws-navy);
        }

        header {
            background-color: var(--aws-navy);
            color: var(--aws-white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo-sim {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 2rem;
            background: #404d5e;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-bar {
            background-color: var(--aws-orange);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-board {
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background-color: var(--aws-white);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: var(--aws-orange);
            background-color: #fffaf0;
        }

        .option.selected {
            border-color: var(--aws-orange);
            background-color: #fff4e6;
        }

        .option.correct {
            border-color: #2e7d32;
            background-color: var(--success);
        }

        .option.incorrect {
            border-color: #d32f2f;
            background-color: var(--error);
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--explanation);
            border-left: 5px solid var(--aws-orange);
            border-radius: 4px;
            display: none;
        }

        .btn {
            background-color: var(--aws-orange);
            color: var(--aws-white);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #dashboard {
            text-align: center;
            display: none;
        }

        .result-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--aws-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 2rem auto;
        }

        @media (max-width: 600px) {
            header { flex-wrap: wrap; padding: 0.5rem 1rem; gap: 0.5rem; }
            .logo-sim { font-size: 1rem; }
            .progress-container { width: 100%; margin: 0; flex-grow: unset; }
            main { padding: 0 0.5rem; }
            .result-circle { width: 120px; height: 120px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-sim">AWS CERTIFIED CLOUD PRACTITIONER</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div class="score-board">Puntuación: <span id="current-score">0</span></div>
</header>

<div class="container">
    <div id="quiz-area">
        <div class="card" id="question-card">
            <div id="question-count" style="color: #666; margin-bottom: 0.5rem;">Pregunta 1 de 20</div>
            <div class="question-text" id="question-text">Cargando pregunta...</div>
            <div class="options" id="options-container">
                <!-- Opciones se cargan aquí -->
            </div>
            <div class="explanation" id="explanation-box">
                <strong>Explicación:</strong> <span id="explanation-text"></span>
            </div>
            <button class="btn" id="next-btn" onclick="handleNext()" disabled>Siguiente Pregunta</button>
        </div>
    </div>

    <div id="dashboard" class="card">
        <h2>Examen Finalizado</h2>
        <div class="result-circle" id="final-score">0%</div>
        <p id="result-message"></p>
        <button class="btn" onclick="restartQuiz()">Reiniciar todo (Shuffle)</button>
    </div>
</div>

<script>
    const allQuestions = [
        {
            question: "¿Cuál es la principal diferencia entre Alta Disponibilidad (HA) y Tolerancia a Fallos (FT)?",
            options: [
                "HA es más cara que FT",
                "HA garantiza que el sistema esté arriba con mínimas interrupciones, mientras que FT garantiza cero interrupciones",
                "HA solo funciona en una Zona de Disponibilidad",
                "FT es responsabilidad de AWS y HA es del cliente"
            ],
            correct: 1,
            explanation: "La Alta Disponibilidad (HA) busca maximizar el uptime permitiendo fallos menores que se recuperan rápido. La Tolerancia a Fallos (FT) busca que el usuario no perciba absolutamente ningún fallo, lo cual es mucho más costoso."
        },
        {
            question: "Una empresa desea añadir más memoria RAM a su instancia de EC2 actual para manejar un proceso pesado. ¿Qué tipo de escalado está realizando?",
            options: [
                "Escalado Horizontal (Scale Out)",
                "Escalado Dinámico",
                "Escalado Vertical (Scale Up)",
                "Elasticidad"
            ],
            correct: 2,
            explanation: "El escalado vertical (Scale Up) implica cambiar el tamaño de una instancia existente para darle más potencia (CPU/RAM)."
        },
        {
            question: "¿Qué concepto describe mejor la capacidad de AWS de ajustar automáticamente los recursos para que coincidan con la demanda exacta?",
            options: [
                "Escalabilidad",
                "Tolerancia a Fallos",
                "Elasticidad",
                "Redundancia"
            ],
            correct: 2,
            explanation: "La elasticidad es la capacidad de crecer y achicarse automáticamente según la demanda, optimizando los costos."
        },
        {
            question: "Para lograr una arquitectura con Alta Disponibilidad en AWS, ¿cuál es la mejor práctica recomendada?",
            options: [
                "Lanzar todas las instancias en la misma Zona de Disponibilidad (AZ)",
                "Desplegar instancias en múltiples Zonas de Disponibilidad (AZs)",
                "Usar una sola instancia muy grande (Scale Up)",
                "Desplegar en múltiples regiones únicamente"
            ],
            correct: 1,
            explanation: "Desplegar en múltiples AZs protege contra fallos en un centro de datos físico, lo que permite que el sistema siga operando desde otra zona."
        },
        {
            question: "¿Qué término se refiere a un componente que, si falla, provoca la detención de todo el sistema?",
            options: [
                "Punto Único de Falla (SPOF)",
                "Instancia elástica",
                "Zona de Disponibilidad aislada",
                "Escalado ineficiente"
            ],
            correct: 0,
            explanation: "Un Single Point of Failure (SPOF) es cualquier parte del sistema que no tiene redundancia y cuya falla colapsa el servicio."
        },
        {
            question: "Usted tiene un sitio web que recibe miles de visitas nuevas tras publicar un anuncio en TV. Decide añadir 5 instancias nuevas idénticas. ¿Cómo se llama esta acción?",
            options: [
                "Scaling In",
                "Scaling Up",
                "Scaling Out",
                "Scaling Down"
            ],
            correct: 2,
            explanation: "Scaling Out (escalado horizontal) es añadir más instancias idénticas para repartir la carga de trabajo."
        },
        {
            question: "Según el Modelo de Responsabilidad Compartida, ¿quién es responsable de configurar la redundancia de las instancias EC2 del cliente?",
            options: [
                "AWS (Seguridad DE la nube)",
                "El Cliente (Seguridad EN la nube)",
                "Tanto AWS como el Cliente",
                "El proveedor de red de internet"
            ],
            correct: 1,
            explanation: "AWS provee la infraestructura (AZs), pero es responsabilidad del cliente configurar sus aplicaciones para que sean redundantes y usen esas AZs."
        },
        {
            question: "La frase 'Diseñar para el fallo' (Design for Failure) implica que:",
            options: [
                "Debemos esperar que el hardware falle y crear sistemas redundantes para mitigarlo",
                "Las aplicaciones de AWS fallan con frecuencia",
                "No debemos preocuparnos por los fallos porque AWS los arregla",
                "Debemos usar solo servicios Serverless"
            ],
            correct: 0,
            explanation: "Es un principio de diseño en AWS: asumir que todo fallará eventualmente y construir redundancia para que el sistema sea resiliente."
        },
        {
            question: "¿Cuál es una desventaja del escalado vertical (Scale Up) comparado con el horizontal?",
            options: [
                "Es más difícil de configurar",
                "Tiene un límite físico máximo y suele requerir tiempo de inactividad para cambiar el tamaño",
                "Es siempre más barato",
                "No permite el uso de CloudWatch"
            ],
            correct: 1,
            explanation: "El escalado vertical tiene límites (el tamaño máximo de instancia disponible) y usualmente requiere detener y reiniciar la instancia para aplicar el cambio."
        },
        {
            question: "Si una empresa quiere reducir sus costos al mínimo, ¿qué aspecto de la elasticidad debe priorizar?",
            options: [
                "Scaling Out",
                "Scaling In",
                "Scaling Up",
                "Provisionamiento Programático"
            ],
            correct: 1,
            explanation: "Scaling In (quitar recursos cuando no se necesitan) es la clave para ahorrar dinero, ya que dejas de pagar por instancias ociosas."
        },
        {
            question: "¿Cuál de los siguientes es un escenario de Tolerancia a Fallos (FT)?",
            options: [
                "Un servidor web falla y el sistema tarda 2 minutos en lanzar uno nuevo automáticamente",
                "Una base de datos tiene una réplica exacta procesando los mismos datos en tiempo real y asume la carga instantáneamente sin pérdida de conexión",
                "Un usuario recibe un error 404 pero al refrescar la página ya funciona",
                "El sistema reduce su capacidad durante la noche"
            ],
            correct: 1,
            explanation: "La FT implica que el usuario no nota el fallo. Una réplica activa 'shadow' que asume la carga sin desconexión es un ejemplo de FT."
        },
        {
            question: "¿Qué servicio ayuda a distribuir el tráfico entre múltiples baristas (instancias) para evitar que uno solo se sature? (Anticipando contenido)",
            options: [
                "AWS Shield",
                "Elastic Load Balancing",
                "Amazon Inspector",
                "AWS Artifact"
            ],
            correct: 1,
            explanation: "El Elastic Load Balancing (ELB) es el 'maître' que reparte el tráfico para que ninguna instancia sea un SPOF o se sobrecargue."
        },
        {
            question: "Elija 2 beneficios de usar múltiples Zonas de Disponibilidad (AZs): (Seleccione 2)",
            options: [
                "Protección contra desastres naturales en un centro de datos",
                "Reducción automática del costo de la instancia",
                "Mayor Alta Disponibilidad",
                "Acceso directo al código fuente de AWS"
            ],
            multi: true,
            correct: [0, 2],
            explanation: "Usar múltiples AZs provee aislamiento de fallos físicos y aumenta drásticamente la Alta Disponibilidad (HA)."
        },
        {
            question: "En la analogía de la cafetería, si Anabel (toma pedidos) se enferma y el negocio se detiene, ¿qué representaba Anabel?",
            options: [
                "Un sistema elástico",
                "Un Punto Único de Falla (SPOF)",
                "Escalado Vertical",
                "Una Región de AWS"
            ],
            correct: 1,
            explanation: "Si el negocio depende de un solo componente para funcionar, ese componente es un SPOF."
        },
        {
            question: "¿Por qué el escalado horizontal es preferido para la nube?",
            options: [
                "Porque es infinito y permite redundancia",
                "Porque es más rápido de configurar manualmente",
                "Porque no requiere el uso de VPC",
                "Porque solo usa instancias Spot"
            ],
            correct: 0,
            explanation: "El escalado horizontal permite añadir teóricamente infinitas instancias y, al ser múltiples nodos, si uno falla, los demás siguen operando."
        },
        {
            question: "¿Qué sucede con el costo en un modelo de planificación tradicional (On-Premises) si la demanda es menor a la proyectada?",
            options: [
                "El costo baja automáticamente",
                "Se pierde dinero debido a la capacidad ociosa (CapEx desperdiciado)",
                "AWS devuelve el dinero",
                "No hay impacto financiero"
            ],
            correct: 1,
            explanation: "En On-Premises compras hardware por adelantado. Si no lo usas, es dinero perdido en servidores que no están generando valor."
        },
        {
            question: "¿Qué es el 'Aprovisionamiento Programático'?",
            options: [
                "Lanzar instancias usando la consola de AWS manualmente",
                "Uso de código o scripts para crear recursos de forma consistente y rápida",
                "Pedir permiso a AWS por correo para lanzar un servidor",
                "El horario en que se apagan las instancias"
            ],
            correct: 1,
            explanation: "Es el uso de APIs o código para automatizar la creación de infraestructura, evitando errores humanos y ganando velocidad."
        },
        {
            question: "Un cliente de AWS quiere asegurarse de que su aplicación pueda escalar, pero no le importa si hay una interrupción de 30 segundos durante la recuperación. ¿Qué debe buscar?",
            options: [
                "Tolerancia a Fallos extrema",
                "Alta Disponibilidad (HA)",
                "Solo usar Regiones",
                "Escalado Vertical únicamente"
            ],
            correct: 1,
            explanation: "La HA permite pequeñas interrupciones de recuperación a cambio de ser mucho más económica que la Tolerancia a Fallos."
        },
        {
            question: "¿Qué aspecto de la infraestructura global de AWS permite el aislamiento de fallos entre AZs?",
            options: [
                "Que están en países distintos",
                "Que tienen alimentación eléctrica, refrigeración y conectividad independientes",
                "Que usan diferentes sistemas operativos",
                "Que son propiedad de empresas distintas"
            ],
            correct: 1,
            explanation: "Las AZs están separadas físicamente para que un problema (ej. incendio) en una no afecte a las demás."
        },
        {
            question: "Seleccione la combinación correcta: El escalado _________ añade potencia, mientras que el _________ añade instancias.",
            options: [
                "Horizontal / Vertical",
                "Vertical / Horizontal",
                "Elástico / Escalable",
                "Automático / Manual"
            ],
            correct: 1,
            explanation: "Vertical = Potencia (RAM/CPU). Horizontal = Cantidad (Más máquinas)."
        }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptions = [];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function restartQuiz() {
        currentQuestions = shuffle([...allQuestions]);
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('current-score').innerText = '0';
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        selectedOptions = [];
        document.getElementById('question-count').innerText = `Pregunta ${currentQuestionIndex + 1} de ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(index, div);
            container.appendChild(div);
        });

        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').disabled = true;
        updateProgressBar();
    }

    function selectOption(index, element) {
        const q = currentQuestions[currentQuestionIndex];
        
        if (q.multi) {
            if (selectedOptions.includes(index)) {
                selectedOptions = selectedOptions.filter(i => i !== index);
                element.classList.remove('selected');
            } else {
                selectedOptions.push(index);
                element.classList.add('selected');
            }
            document.getElementById('next-btn').disabled = selectedOptions.length === 0;
        } else {
            // Single choice logic
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedOptions = [index];
            checkAnswer();
        }
    }

    function checkAnswer() {
        const q = currentQuestions[currentQuestionIndex];
        const options = document.querySelectorAll('.option');
        let isCorrect = false;

        if (q.multi) {
            isCorrect = q.correct.every(i => selectedOptions.includes(i)) && selectedOptions.length === q.correct.length;
        } else {
            isCorrect = selectedOptions[0] === q.correct;
        }

        options.forEach((opt, index) => {
            opt.onclick = null; // Disable clicks
            if (q.multi) {
                if (q.correct.includes(index)) opt.classList.add('correct');
                else if (selectedOptions.includes(index)) opt.classList.add('incorrect');
            } else {
                if (index === q.correct) opt.classList.add('correct');
                else if (selectedOptions.includes(index)) opt.classList.add('incorrect');
            }
        });

        if (isCorrect) {
            score++;
            document.getElementById('current-score').innerText = score;
        }

        document.getElementById('explanation-text').innerText = q.explanation;
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('next-btn').disabled = false;
    }

    function handleNext() {
        if (currentQuestions[currentQuestionIndex].multi && document.getElementById('explanation-box').style.display === 'none') {
            checkAnswer();
            return;
        }

        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            showQuestion();
        } else {
            showDashboard();
        }
    }

    function updateProgressBar() {
        const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showDashboard() {
        document.getElementById('quiz-area').style.display = 'none';
        const dashboard = document.getElementById('dashboard');
        dashboard.style.display = 'block';
        
        const percent = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('final-score').innerText = `${percent}%`;
        
        let msg = "";
        if (percent >= 70) msg = "¡Excelente! Estás listo para los conceptos de infraestructura global y HA.";
        else msg = "Buen intento. Revisa la diferencia entre HA y FT y el concepto de Multi-AZ.";
        
        document.getElementById('result-message').innerText = msg;
    }

    // Start on load
    restartQuiz();
</script>

</body>
</html>
