<!DOCTYPE html>
<html lang="es">

        }

        }

            border-color: #2e7d32;
        }

        .option.incorrect {
            background-color: var(--error);
            border-color: #d32f2f;
        }

            padding: 1rem;
            border-radius: 4px;
            display: none;
        }

        .feedback.visible {
            display: block;
        }

        .explanation {
            background-color: var(--explanation);
            border-left: 4px solid var(--aws-orange);
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        button {
            background-color: var(--aws-orange);
            color: var(--white);

            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e68a00;
        }

        button:disabled {
            background-color: #ccc;

        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        #score-display {
            font-weight: bold;
            color: var(--aws-orange);
        }

        .dashboard {

        }

        .result-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--aws-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 2rem auto;
        }

        .multi-choice-hint {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;

        }

        /* Responsive */
        @media (max-width: 600px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
            }

</head>

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptions = [];
    let shuffledQuestions = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        shuffledQuestions = shuffle([...questions]);
        currentQuestionIndex = 0;
        score = 0;
        showQuestion();
    }

        const q = shuffledQuestions[currentQuestionIndex];
        const container = document.getElementById('quiz-container');
        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        document.getElementById('score-display').innerText = score;
        
        // Update Progress Bar
        const progress = ((currentQuestionIndex) / shuffledQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";

        let optionsHtml = '';
        q.options.forEach((opt, index) => {
            optionsHtml += `
                <div class="option" onclick="selectOption(${index})" id="opt-${index}">
                    <span class="bullet">${String.fromCharCode(65 + index)}.</span>
                    <span>${opt}</span>
                </div>
            `;
        });

        const multiHint = q.type === 'multi' ? `<div class="multi-choice-hint">(Seleccione todas las que correspondan)</div>` : '';

        container.innerHTML = `
            <div class="card">
                <div style="color: #666; font-size: 0.8rem; margin-bottom: 5px;">${q.category}</div>
                <div class="question-text">${q.question}</div>
                ${multiHint}
                <div class="options">
                    ${optionsHtml}
                </div>
                <div id="feedback-area" class="feedback">
                    <div id="feedback-status" style="font-weight: bold; margin-bottom: 10px;"></div>
                    <div class="explanation" id="explanation-text"></div>
                </div>
            </div>
        `;

        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'none';
        selectedOptions = [];
    }

    function selectOption(index) {
        const q = shuffledQuestions[currentQuestionIndex];
        const optElement = document.getElementById(`opt-${index}`);

        if (q.type === 'single') {
            // Deselect others
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            optElement.classList.add('selected');
            selectedOptions = [index];
        } else {
            // Multi-choice
            if (optElement.classList.contains('selected')) {
                optElement.classList.remove('selected');
                selectedOptions = selectedOptions.filter(i => i !== index);
            } else {
                optElement.classList.add('selected');
                selectedOptions.push(index);
            }
        }

        document.getElementById('submit-btn').disabled = selectedOptions.length === 0;
    }

    function checkAnswer() {
        const q = shuffledQuestions[currentQuestionIndex];
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackStatus = document.getElementById('feedback-status');
        const explanationText = document.getElementById('explanation-text');
        
        let isCorrect = false;

        if (q.type === 'single') {
            isCorrect = selectedOptions[0] === q.answer;
        } else {
            // Sort and compare arrays
            const sortedSelected = [...selectedOptions].sort();
            const sortedAnswer = [...q.answer].sort();
            isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedAnswer);
        }

        if (isCorrect) {
            score++;
            feedbackStatus.innerText = "¡Correcto!";
            feedbackStatus.style.color = "#2e7d32";
            feedbackArea.style.backgroundColor = "var(--success)";
            
            selectedOptions.forEach(idx => {
                document.getElementById(`opt-${idx}`).classList.add('correct');
            });
        } else {
            feedbackStatus.innerText = "Incorrecto";
            feedbackStatus.style.color = "#d32f2f";
            feedbackArea.style.backgroundColor = "var(--error)";
            
            selectedOptions.forEach(idx => {
                document.getElementById(`opt-${idx}`).classList.add('incorrect');
            });

            // Highlight correct answer
            if (q.type === 'single') {
                document.getElementById(`opt-${q.answer}`).classList.add('correct');
            } else {
                q.answer.forEach(idx => {
                    document.getElementById(`opt-${idx}`).classList.add('correct');
                });
            }
        }

        explanationText.innerText = q.explanation;
        feedbackArea.classList.add('visible');
        
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        
        // Update score display immediately
        document.getElementById('score-display').innerText = score;
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < shuffledQuestions.length) {
            showQuestion();
        } else {
            showDashboard();
        }
    }

    function showDashboard() {
        const container = document.getElementById('quiz-container');
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';
        
        document.getElementById('progress-bar').style.width = "100%";
        
        const percentage = Math.round((score / shuffledQuestions.length) * 100);
        let message = "";
        if (percentage >= 80) message = "¡Excelente! Estás listo para el examen.";
        else if (percentage >= 60) message = "Buen trabajo, pero necesitas repasar algunos conceptos.";
        else message = "Te recomendamos volver a leer las lecciones y reintentar.";

        container.innerHTML = `
            <div class="card dashboard">
                <h2>Resultado Final</h2>
                <div class="result-circle">${percentage}%</div>
                <p>${score} de ${shuffledQuestions.length} correctas</p>
                <p>${message}</p>
                <button onclick="initQuiz()">Reiniciar Evaluación (Shuffle)</button>
            </div>
        `;
    }

    window.onload = initQuiz;
</script>

</body>
</html>
