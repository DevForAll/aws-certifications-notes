<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Exam Simulator - Módulo 2 Lección 6 Parte 2</title>
    <style>
        :root {
            --aws-navy: #232f3e;
            --aws-orange: #ff9900;
            --aws-white: #ffffff;
            --aws-gray: #f2f3f3;
            --success: #e7f4e4;
            --error: #fdf0f0;
            --explanation: #fff9c4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--aws-gray);
            margin: 0;
            padding: 0;
            color: var(--aws-navy);
        }

        header {
            background-color: var(--aws-navy);
            color: var(--aws-white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo-sim {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 2rem;
            background: #404d5e;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-bar {
            background-color: var(--aws-orange);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-board {
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background-color: var(--aws-white);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: var(--aws-orange);
            background-color: #fffaf0;
        }

        .option.selected {
            border-color: var(--aws-orange);
            background-color: #fff4e6;
        }

        .option.correct {
            border-color: #2e7d32;
            background-color: var(--success);
        }

        .option.incorrect {
            border-color: #d32f2f;
            background-color: var(--error);
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--explanation);
            border-left: 5px solid var(--aws-orange);
            border-radius: 4px;
            display: none;
        }

        .btn {
            background-color: var(--aws-orange);
            color: var(--aws-white);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #dashboard {
            text-align: center;
            display: none;
        }

        .result-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--aws-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 2rem auto;
        }

        @media (max-width: 600px) {
            header { flex-wrap: wrap; padding: 0.5rem 1rem; gap: 0.5rem; }
            .logo-sim { font-size: 1rem; }
            .progress-container { width: 100%; margin: 0; flex-grow: unset; }
            main { padding: 0 0.5rem; }
            .result-circle { width: 120px; height: 120px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-sim">AWS CERTIFIED CLOUD PRACTITIONER</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div class="score-board">Puntuación: <span id="current-score">0</span></div>
</header>

<div class="container">
    <div id="quiz-area">
        <div class="card" id="question-card">
            <div id="question-count" style="color: #666; margin-bottom: 0.5rem;">Pregunta 1 de 20</div>
            <div class="question-text" id="question-text">Cargando pregunta...</div>
            <div class="options" id="options-container">
                <!-- Opciones se cargan aquí -->
            </div>
            <div class="explanation" id="explanation-box">
                <strong>Explicación:</strong> <span id="explanation-text"></span>
            </div>
            <button class="btn" id="next-btn" onclick="handleNext()" disabled>Siguiente Pregunta</button>
        </div>
    </div>

    <div id="dashboard" class="card">
        <h2>Examen Finalizado</h2>
        <div class="result-circle" id="final-score">0%</div>
        <p id="result-message"></p>
        <button class="btn" onclick="restartQuiz()">Reiniciar todo (Shuffle)</button>
    </div>
</div>

<script>
    const allQuestions = [
        {
            question: "¿Cuál es la función principal de Amazon EC2 Auto Scaling?",
            options: [
                "Monitorear el uso de CPU de las instancias",
                "Añadir o eliminar automáticamente instancias EC2 para mantener el número deseado según la demanda",
                "Distribuir el tráfico web entre múltiples regiones",
                "Almacenar datos de forma persistente"
            ],
            correct: 1,
            explanation: "EC2 Auto Scaling es el servicio encargado de la ejecución: añade (Scale Out) o quita (Scale In) instancias para cumplir con las políticas de capacidad."
        },
        {
            question: "¿Qué servicio de AWS se utiliza para recopilar métricas y emitir alarmas que disparan el auto-escalado?",
            options: [
                "Amazon EC2 Auto Scaling",
                "Amazon CloudWatch",
                "AWS Trusted Advisor",
                "AWS Systems Manager"
            ],
            correct: 1,
            explanation: "Amazon CloudWatch es el monitor que observa las métricas (CPU, red, etc.) y envía la alarma para que Auto Scaling actúe."
        },
        {
            question: "En una configuración de Auto Scaling, ¿cuál es el propósito de la 'Capacidad Mínima'?",
            options: [
                "Es el máximo de dinero que se quiere gastar",
                "Garantizar que siempre haya un número base de instancias funcionando, incluso si no hay tráfico",
                "Indicar cuántas instancias hay en este momento exacto",
                "Limitar el número de usuarios que pueden entrar al sitio"
            ],
            correct: 1,
            explanation: "La Capacidad Mínima asegura que el servicio esté siempre disponible a un nivel básico, evitando que se quede con cero instancias."
        },
        {
            question: "¿Qué documento de configuración se utiliza en Auto Scaling para definir qué tipo de instancia, AMI y Security Group se deben usar al lanzar nuevas instancias?",
            options: [
                "IAM Policy",
                "Launch Template",
                "S3 Bucket Policy",
                "VPC Peering"
            ],
            correct: 1,
            explanation: "El Launch Template es la 'receta' o plano que define todas las características de las nuevas instancias que Auto Scaling creará."
        },
        {
            question: "Una empresa sabe que todos los viernes a las 6 PM el tráfico aumenta significativamente. ¿Qué estrategia de escalado es la más adecuada?",
            options: [
                "Dynamic Scaling",
                "Predictive Scaling",
                "Scheduled Scaling",
                "Manual Scaling"
            ],
            correct: 2,
            explanation: "El Scheduled Scaling (escalado programado) es ideal para eventos conocidos con fecha y hora fija."
        },
        {
            question: "¿Qué característica de Amazon EC2 Auto Scaling permite predecir el tráfico futuro basándose en patrones históricos usando Machine Learning?",
            options: [
                "Dynamic Scaling",
                "Predictive Scaling",
                "Scheduled Scaling",
                "Auto ML Scaling"
            ],
            correct: 1,
            explanation: "El Predictive Scaling usa Machine Learning para analizar el pasado y adelantarse a la demanda futura (CLF-C02)."
        },
        {
            question: "¿Qué ocurre si una instancia dentro de un grupo de Auto Scaling falla su 'Health Check' (prueba de salud)?",
            options: [
                "Auto Scaling la reinicia automáticamente",
                "Auto Scaling la termina y lanza una nueva instancia para reemplazarla",
                "CloudWatch envía un correo al administrador y espera instrucciones",
                "La instancia se queda ahí pero deja de recibir tráfico"
            ],
            correct: 1,
            explanation: "Auto Scaling mantiene la 'Capacidad Deseada'. Si una instancia muere, la reemplaza automáticamente por una nueva para mantener el número de servidores configurado."
        },
        {
            question: "¿Qué concepto describe el periodo de espera después de una actividad de escalado antes de que pueda ocurrir otra?",
            options: [
                "Latencia de Red",
                "Cooldown Period",
                "Warm-up Time",
                "Time-to-Live (TTL)"
            ],
            correct: 1,
            explanation: "El Cooldown Period evita que el sistema escale de más (o de menos) muy rápido antes de ver el efecto real de la primera acción de escalado."
        },
        {
            question: "¿Cuál es el beneficio de escalar los componentes de una aplicación de forma independiente?",
            options: [
                "Se ve más ordenado en la consola",
                "Optimización de costos: escalas solo lo que necesita más recursos (ej. solo el backend)",
                "Permite usar diferentes regiones",
                "Reduce la latencia de CloudWatch"
            ],
            correct: 1,
            explanation: "Si el cuello de botella está solo en el procesamiento de datos, no necesitas pagar por más servidores web frontales. Escalar cada pieza ahorra dinero."
        },
        {
            question: "Usted desea que su aplicación escale cuando el uso de CPU supere el 70%. ¿Qué objeto de CloudWatch debe crear?",
            options: [
                "Un Dashboard",
                "Una Alarma",
                "Un Log Group",
                "Un Event Rule"
            ],
            correct: 1,
            explanation: "Las Alarmas de CloudWatch son las que notifican a otros servicios (como Auto Scaling) cuando una métrica cruza un umbral definido."
        },
        {
            question: "En la analogía de la cafetería, ¿qué representaría Amazon CloudWatch?",
            options: [
                "El supervisor que cuenta cuántas personas hay en la fila y si los baristas están cansados",
                "El nuevo barista que llega a ayudar",
                "El menú de precios",
                "La máquina de café"
            ],
            correct: 0,
            explanation: "CloudWatch es el observador/monitor que recopila los datos sobre el rendimiento del sistema."
        },
        {
            question: "¿Cuál es la 'Trampa de Examen' más común sobre CloudWatch?",
            options: [
                "Decir que CloudWatch puede crear instancias por sí solo",
                "Decir que CloudWatch es solo para S3",
                "Decir que CloudWatch es gratuito para siempre",
                "Decir que CloudWatch no tiene interfaz gráfica"
            ],
            correct: 0,
            explanation: "Recuerda: CloudWatch monitorea y avisa (Alarma), pero NO tiene el poder de crear recursos. Esa es tarea de Auto Scaling."
        },
        {
            question: "¿Qué sucede con el costo si Auto Scaling realiza un 'Scale In'?",
            options: [
                "El costo aumenta debido a la tarifa de terminación",
                "El costo disminuye porque se dejan de pagar las instancias eliminadas",
                "El costo se mantiene igual",
                "El costo se transfiere a CloudWatch"
            ],
            correct: 1,
            explanation: "Scale In = Menos instancias = Menos gasto. Es el corazón del ahorro por pago por uso."
        },
        {
            question: "Elija 3 parámetros fundamentales de un grupo de Auto Scaling: (Seleccione 3)",
            options: [
                "Capacidad Mínima",
                "Capacidad Máxima",
                "Capacidad Deseada",
                "Capacidad Reservada",
                "Capacidad On-Demand"
            ],
            multi: true,
            correct: [0, 1, 2],
            explanation: "Min, Max y Desired (Deseada) son los tres valores que definen el tamaño de la flota en un Auto Scaling Group."
        },
        {
            question: "Un cliente quiere combinar instancias On-Demand para estabilidad e instancias Spot para ahorro dentro de un mismo grupo de escalado. ¿Qué debe usar?",
            options: [
                "Launch Configuration",
                "Launch Template",
                "IAM Role",
                "Placement Group"
            ],
            correct: 1,
            explanation: "Los Launch Templates (Plantillas de Lanzamiento) permiten configuraciones avanzadas como el uso de múltiples tipos de compra (On-Demand + Spot)."
        },
        {
            question: "¿Qué métrica NO es estándar en CloudWatch para EC2 y requeriría un agente adicional? (Pregunta difícil)",
            options: [
                "Uso de CPU",
                "Utilización de Memoria RAM",
                "Tráfico de Red Entrante",
                "Estado de la instancia"
            ],
            correct: 1,
            explanation: "La RAM es una métrica a nivel de Sistema Operativo, no del hipervisor. AWS ve el CPU y la Red, pero para ver la RAM necesitas instalar un agente (o es una métrica personalizada)."
        },
        {
            question: "¿Cuál es la principal ventaja del Dynamic Scaling sobre el Scheduled Scaling?",
            options: [
                "Es más barato",
                "Permite responder a cambios de tráfico impredecibles",
                "No requiere CloudWatch",
                "Solo funciona en una AZ"
            ],
            correct: 1,
            explanation: "El escalado dinámico responde a lo que está pasando AHORA (basado en métricas), mientras que el programado solo sigue un reloj."
        },
        {
            question: "¿En qué se basa el Auto Scaling para saber que debe 'terminar' (eliminar) una instancia?",
            options: [
                "En la métrica de 'Scale In' definida en la política de escalado",
                "En que la instancia está muy vieja",
                "En que el cliente ya no tiene dinero",
                "En que la instancia alcanzó el 100% de CPU"
            ],
            correct: 0,
            explanation: "Las políticas de escalado definen tanto cuándo añadir como cuándo quitar instancias (ej. 'si el CPU baja del 20%, quita 1 instancia')."
        },
        {
            question: "Si una empresa quiere 'Alta Disponibilidad' usando Auto Scaling, ¿cómo debe configurar el grupo?",
            options: [
                "Asignar subredes en múltiples Zonas de Disponibilidad",
                "Poner el máximo de instancias en 1",
                "Usar solo instancias tipo T2 micro",
                "Desactivar CloudWatch"
            ],
            correct: 0,
            explanation: "Al asignar subredes de varias AZs, Auto Scaling distribuirá las instancias automáticamente entre ellas, protegiendo contra fallos de una zona."
        },
        {
            question: "Resumen: ¿Qué par de servicios permiten la 'Elasticidad' en EC2?",
            options: [
                "EC2 e IAM",
                "CloudWatch y Auto Scaling",
                "S3 y CloudFront",
                "VPC y Security Groups"
            ],
            correct: 1,
            explanation: "CloudWatch monitorea (el cerebro) y Auto Scaling actúa (el músculo)."
        }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptions = [];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function restartQuiz() {
        currentQuestions = shuffle([...allQuestions]);
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('current-score').innerText = '0';
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        selectedOptions = [];
        document.getElementById('question-count').innerText = `Pregunta ${currentQuestionIndex + 1} de ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(index, div);
            container.appendChild(div);
        });

        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').disabled = true;
        updateProgressBar();
    }

    function selectOption(index, element) {
        const q = currentQuestions[currentQuestionIndex];
        
        if (q.multi) {
            if (selectedOptions.includes(index)) {
                selectedOptions = selectedOptions.filter(i => i !== index);
                element.classList.remove('selected');
            } else {
                selectedOptions.push(index);
                element.classList.add('selected');
            }
            document.getElementById('next-btn').disabled = selectedOptions.length === 0;
        } else {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedOptions = [index];
            checkAnswer();
        }
    }

    function checkAnswer() {
        const q = currentQuestions[currentQuestionIndex];
        const options = document.querySelectorAll('.option');
        let isCorrect = false;

        if (q.multi) {
            isCorrect = q.correct.every(i => selectedOptions.includes(i)) && selectedOptions.length === q.correct.length;
        } else {
            isCorrect = selectedOptions[0] === q.correct;
        }

        options.forEach((opt, index) => {
            opt.onclick = null;
            if (q.multi) {
                if (q.correct.includes(index)) opt.classList.add('correct');
                else if (selectedOptions.includes(index)) opt.classList.add('incorrect');
            } else {
                if (index === q.correct) opt.classList.add('correct');
                else if (selectedOptions.includes(index)) opt.classList.add('incorrect');
            }
        });

        if (isCorrect) {
            score++;
            document.getElementById('current-score').innerText = score;
        }

        document.getElementById('explanation-text').innerText = q.explanation;
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('next-btn').disabled = false;
    }

    function handleNext() {
        if (currentQuestions[currentQuestionIndex].multi && document.getElementById('explanation-box').style.display === 'none') {
            checkAnswer();
            return;
        }

        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            showQuestion();
        } else {
            showDashboard();
        }
    }

    function updateProgressBar() {
        const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showDashboard() {
        document.getElementById('quiz-area').style.display = 'none';
        const dashboard = document.getElementById('dashboard');
        dashboard.style.display = 'block';
        
        const percent = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('final-score').innerText = `${percent}%`;
        
        let msg = "";
        if (percent >= 70) msg = "¡Excelente! Dominas el funcionamiento de CloudWatch y Auto Scaling.";
        else msg = "Buen intento. Repasa la diferencia entre métrica y alarma, y los tipos de capacidad de Auto Scaling.";
        
        document.getElementById('result-message').innerText = msg;
    }

    restartQuiz();
</script>

</body>
</html>
